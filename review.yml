reviews:
  - date: '2026-06-03'
    rating: 4
    summary: >-
      UCSB operates a mature, formally structured API Developer Portal at
      developer.ucsb.edu exposing dozens of enterprise APIs across six
      categories (Academics, Administration, Dining, Employees, Housing,
      Students). Portal pages, API directory, and getting-started docs were
      verified live (HTTP 200), but nearly all APIs are gated behind required
      registration and manual account approval, so no public base URLs or live
      endpoints could be probed without an approved account. An official GitHub
      org (github.com/ucsb, 82 public repos) and the Library's Samvera-based
      Alexandria Digital Research Library (ADRL) were confirmed live. No
      endpoints, keys, or schemas were fabricated; only confirmed properties are
      cataloged.
    endpoints:
